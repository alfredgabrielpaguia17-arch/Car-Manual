<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | A&A Auto Manual</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">A&A Auto Manual</div>
    <div class="nav-list">
      <a class="outline" href="../index.html">Home</a>
      <a class="primary-btn" href="login.html">Login</a>
    </div>
  </header>
  <main class="section">
    <div class="container">
      <div class="auth-card">
        <div class="page-header">
          <div>
            <h1>Create Account</h1>
            <p class="hero-subtitle">Register a new Firestore user account.</p>
          </div>
        </div>
        <form id="register-form" class="form-grid">
          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" required placeholder="Jane Doe" />
          </div>
          <div class="input-group">
            <label for="username">Username</label>
            <input id="username" type="text" required placeholder="yourusername" />
          </div>
          <div class="input-group">
            <label for="email">Email</label>
            <input id="email" type="email" required placeholder="you@example.com" />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input id="password" type="password" required placeholder="Enter password" />
          </div>
          <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" required placeholder="Confirm password" />
          </div>
          <button type="submit" class="btn primary-btn">Create Account</button>
          <p id="auth-message" class="message"></p>
        </form>
      </div>
    </div>
  </main>
  <footer class="footer">
    <div class="container">
      <p>Already have an account? <a href="login.html">Login here</a>.</p>
    </div>
  </footer>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
