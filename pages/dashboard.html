<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | A&A Auto Manual</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">A&A Auto Manual</div>
    <div class="nav-list">
      <a href="dashboard.html">Dashboard</a>
      <a href="brand.html?brandId=toyota">Toyota</a>
      <a href="brand.html?brandId=suzuki">Suzuki</a>
      <a href="brand.html?brandId=mitsubishi">Mitsubishi</a>
      <a href="brand.html?brandId=isuzu">Isuzu</a>
      <a href="troubleshooting.html?modelId=vios">Basic Troubleshooting</a>
      <a href="maintenance.html?modelId=vios">Maintenance</a>
      <a href="profile.html">Profile</a>
      <button id="logout-button" class="btn outline">Logout</button>
    </div>
  </header>
  <main class="section">
    <div class="container">
      <div class="page-header">
        <div>
          <h1 id="page-title">Dashboard</h1>
          <p class="hero-subtitle">Browse brand manuals, search issues, and manage your profile.</p>
        </div>
        <div id="user-badge" class="brand-logo">Hi</div>
      </div>
      <section class="section-surface">
        <form id="search-form" class="form-grid">
          <div class="input-group" style="margin-bottom: 0;">
            <label for="search-input">Search manuals, models, problems, or maintenance topics</label>
            <input id="search-input" type="text" placeholder="Search Toyota, Vios, coolant, battery" />
          </div>
          <button type="submit" class="btn primary-btn">Search</button>
        </form>
        <div id="search-results" class="cards-grid" style="margin-top: 2rem;"></div>
      </section>
      <section class="section">
        <h2 class="section-title">Recommended Brands</h2>
        <div id="brand-grid" class="cards-grid"></div>
      </section>
    </div>
  </main>
  <footer class="footer">
    <div class="container">
      <p>Keep your vehicles running smoothly with practical troubleshooting and maintenance guidance.</p>
    </div>
  </footer>
  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
